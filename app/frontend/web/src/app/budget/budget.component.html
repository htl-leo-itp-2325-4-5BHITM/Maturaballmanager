<div class="container">
    <h1>Budget</h1>
    <div class="cards">
        <mat-card class="card">
            <h2>Ziel</h2>
            <mat-progress-bar mode="determinate" [value]="goalProgress"></mat-progress-bar>
            <div>{{goal}}€</div>
            <div>Gewinn: {{profit}}€</div>
        </mat-card>

        <mat-card class="card">
            <h2>Gewinn</h2>
            <div>{{profit}}€</div>
        </mat-card>

        <mat-card class="card">
            <h2>Einnahmen</h2>
            <table mat-table [dataSource]="incomeData" class="mat-elevation-z8">
                <ng-container matColumnDef="company">
                    <th mat-header-cell *matHeaderCellDef> Firma </th>
                    <td mat-cell *matCellDef="let element"> {{element.company}} </td>
                </ng-container>

                <ng-container matColumnDef="amount">
                    <th mat-header-cell *matHeaderCellDef> Betrag </th>
                    <td mat-cell *matCellDef="let element"> {{element.amount}}€ </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let element; columns: displayedColumns;"></tr>
            </table>
        </mat-card>

        <mat-card class="card">
            <h2>Ausgaben</h2>
            <table mat-table [dataSource]="expenseData" class="mat-elevation-z8">
                <ng-container matColumnDef="description">
                    <th mat-header-cell *matHeaderCellDef> Beschreibung </th>
                    <td mat-cell *matCellDef="let element"> {{element.description}} </td>
                </ng-container>

                <ng-container matColumnDef="amount">
                    <th mat-header-cell *matHeaderCellDef> Betrag </th>
                    <td mat-cell *matCellDef="let element"> {{element.amount}}€ </td>
                </ng-container>

                <ng-container matColumnDef="upload">
                    <th mat-header-cell *matHeaderCellDef> Rechnung </th>
                    <td mat-cell *matCellDef="let element">
                        <button mat-button (click)="uploadInvoice(element)">Hochladen</button>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumnsExpenses"></tr>
                <tr mat-row *matRowDef="let element; columns: displayedColumnsExpenses;"></tr>
            </table>
        </mat-card>
    </div>
</div>
