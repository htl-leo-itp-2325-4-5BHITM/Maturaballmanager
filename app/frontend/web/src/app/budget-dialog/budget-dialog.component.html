<h1 mat-dialog-title>{{ data.type === 'income' ? 'Einnahmen hinzufügen' : 'Ausgaben hinzufügen' }}</h1>
<div mat-dialog-content>
    <mat-form-field>
        <mat-label>Betrag</mat-label>
        <input matInput [(ngModel)]="amount" type="number">
    </mat-form-field>
</div>

<div mat-dialog-actions>
    <button mat-button (click)="onNoClick()">Abbrechen</button>
    <button mat-button [mat-dialog-close]="amount">Hinzufügen</button>
</div>
