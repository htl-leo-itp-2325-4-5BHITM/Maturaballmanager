<h1 mat-dialog-title>Kontaktperson hinzufügen</h1>
<div mat-dialog-content>
    <mat-form-field appearance="fill">
        <mat-label>Vorname</mat-label>
        <input matInput [(ngModel)]="contactPerson.firstName">
    </mat-form-field>
    <mat-form-field appearance="fill">
        <mat-label>Nachname</mat-label>
        <input matInput [(ngModel)]="contactPerson.lastName">
    </mat-form-field>
    <mat-form-field appearance="fill">
        <mat-label>Position</mat-label>
        <input matInput [(ngModel)]="contactPerson.position">
    </mat-form-field>
    <mat-form-field appearance="fill">
        <mat-label>Email</mat-label>
        <input matInput type="email" [(ngModel)]="contactPerson.mail">
    </mat-form-field>
    <mat-form-field appearance="fill">
        <mat-label>Telefon</mat-label>
        <input matInput [(ngModel)]="contactPerson.phoneNumber">
    </mat-form-field>
</div>
<div mat-dialog-actions>
    <button mat-button (click)="onNoClick()">Abbrechen</button>
    <button mat-button [mat-dialog-close]="contactPerson" cdkFocusInitial>Speichern</button>
</div>
