<nb-card>
    <nb-card-header>
        <h6>Mitglieder durchsuchen</h6>
    </nb-card-header>

    <nb-card-body>
        <!-- Eingabefeld für die Suche -->
        <div style="position: relative;" id="searchSelectBox">
            <input nbInput
                   [(ngModel)]="searchQuery"
                   (input)="filterMembers(searchQuery)"
                   placeholder="Suche nach Mitglied..."
                   style="width: 100%; padding-right: 30px;"/>


            <ul *ngIf="filteredMembers.length > 0; else noResults" class="dropdown-list">
                <li *ngFor="let member of filteredMembers" (click)="onSelect(member)">
                    {{ member.name }}
                </li>
            </ul>

            <ng-template #noResults>
                <p *ngIf="selectedMember == null && searchQuery.length >= 3">Keine Mitglieder gefunden.</p>
            </ng-template>
        </div>

        <label for="radioButton">Rollen:</label>
        <nb-radio-group [(ngModel)]="role" id="radioButton">
            <nb-radio
                    *ngFor="let role of roles"
                    [value]="role.value">
                {{ role.label }}
            </nb-radio>
        </nb-radio-group>
    </nb-card-body>

    <nb-card-footer class="footer-actions">
        <div class="button-group">
            <!--<button nbButton status="basic" id="cancelButton" (click)="cancel()">
                 <nb-icon icon="close-circle-outline"></nb-icon> Abbrechen
             </button>-->

            <span id="cancelButton" (click)="cancel()">
                Abbrechen
            </span>
            <div class="spacer"></div>
            <button nbButton status="success" (click)="submit()">
                <nb-icon icon="save-outline"></nb-icon> Speichern
            </button>
        </div>
    </nb-card-footer>
</nb-card>
