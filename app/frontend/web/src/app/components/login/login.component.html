<div class="login-container">
    <div class="login-form">
        <form>
            <mat-form-field appearance="fill">
                <mat-label>Benutzername</mat-label>
                <input [(ngModel)]="username" name="username" matInput placeholder="Benutzername">
            </mat-form-field>

            <mat-form-field appearance="fill">
                <mat-label>Passwort</mat-label>
                <input [(ngModel)]="password" name="password" matInput type="password" placeholder="Passwort">
            </mat-form-field>

            <mat-spinner *ngIf="isLoading"></mat-spinner>
            <button mat-raised-button color="primary" class="login-button" (click)="login()">Login</button>
            <a href="mailto:t.himmelbauer@htl-leonding.ac.at" class="forgot-password">Passwort vergessen? Wenden Sie sich an den Administrator.</a>
        </form>
    </div>
</div>
