        <button id="deletebutton" class="bg-red-500 text-white px-4 py-2 rounded-lg">Delete</button>
        <label for="file-upload" class="bg-green-500 text-white px-4 py-2 rounded-lg cursor-pointer">Upload</label>
        <input type="file" id="file-upload" class="hidden">
        <div class="flex-1">
