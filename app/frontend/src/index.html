<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maturaballmanager</title>
    <style>
        #addOffcanvas,
        #offcanvas, #exportOffcanvas {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #fff; /* Solid background color */
            padding: 1rem;
            border-radius: 0.5rem;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            z-index: 999; /* Ensure the offcanvas appears above the overlay */
        }

    /* Equivalent styles for Tailwind CSS classes */
        .py-6 {
            padding-top: 1.5rem;
            padding-bottom: 1.5rem;
        }

        .px-6 {
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }

        .text-center {
            text-align: center;
        }

        .input-field {
            width: calc(33.33% - 1rem);
        }

        /* Added styles for scrollable table */
        .table-container {
            max-height: 400px; /* Adjust the max height as needed */
            overflow-y: auto;
        }
         #overlay {
             display: none;
             position: fixed;
             top: 0;
             left: 0;
             width: 100%;
             height: 100%;
             background: rgba(0, 0, 0, 0.5); /* Semi-transparent background color */
             z-index: 998; /* Ensure the overlay appears beneath the offcanvas */
         }

    </style>
</head>

<body class="bg-gray-100 font-sans">
<div class="container mx-auto p-8">
    <h1 class="text-4xl font-bold text-indigo-700 mb-4">Maturaballmanager</h1>
    <h2 class="text-2xl font-bold text-gray-700 mb-8">Sponsorenverwaltung</h2>

    <div class="flex mb-4">
        <div class="flex-1">
            <input id="searchbar" type="text" placeholder="Search..." class="w-full border rounded-lg px-4 py-2">
        </div>
        <label id="searchbutton" class="bg-green-500 text-white px-4 py-2 rounded-lg cursor-pointer">Search</label>
    </div>

    <!-- Table Container -->
    <div class="table-container">
        <!-- Table -->
        <table class="w-full border rounded-lg overflow-hidden text-lg">
            <thead class="bg-indigo-700 text-white">
            <tr>
                <th class="py-4 px-6">Firmenname</th>
                <th class="py-4 px-6">Adresse</th>
                <th class="py-4 px-6">Webseite</th>
                <th class="py-4 px-6">.</th>
            </tr>
            </thead>
            <tbody class="text-gray-700 mt-16">
            <!-- Add your data from the backend using a loop or other dynamic method -->
            <!-- Example row -->

            <!-- Add more rows as needed -->
            </tbody>
        </table>
    </div>

    <!-- Buttons and Search Bar -->
    <div class="flex items-end space-x-4 mt-12">
        <button id="addbutton" class="bg-indigo-700 text-white px-4 py-2 rounded-lg">Add Item</button>
        <button id="deletebutton" class="bg-red-500 text-white px-4 py-2 rounded-lg">Delete</button>
        <button id="exportbutton"  class="bg-green-500 text-white px-4 py-2 rounded-lg">Export data</button>
    </div>

    <!-- Offcanvas for Delete Button -->
    <div id="offcanvas">
        <p class="text-gray-700">Are you sure you want to delete?</p>
        <div class="mt-4 flex space-x-4">
            <button id="confirmbutton" class="bg-red-500 text-white px-4 py-2 rounded-lg">Confirm</button>
            <button class="bg-gray-300 text-gray-700 px-4 py-2 rounded-lg" onclick="document.getElementById('offcanvas').style.display = 'none';">Cancel</button>
        </div>
    </div>

    <!-- Offcanvas for Add Button -->
    <div id="addOffcanvas">
        <h2 class="text-xl font-bold mb-4">Add New Company</h2>
        <input id="newField1" type="text" placeholder="Name" class="input-field border rounded-lg px-4 py-2 mb-2">
        <input id="newField2" type="text" placeholder="Address" class="input-field border rounded-lg px-4 py-2 mb-2">
        <input id="newField3" type="text" placeholder="Website" class="input-field border rounded-lg px-4 py-2 mb-4">
        <button id="confirmAddButton" class="bg-indigo-700 text-white px-4 py-2 rounded-lg mr-2">Add</button>
        <button id="cancelAddButton" class="bg-gray-300 text-gray-700 px-4 py-2 rounded-lg" onclick="closeAddOffcanvas()">Cancel</button>
    </div>

    <!-- Offcanvas for Export Button -->
    <div id="exportOffcanvas">
        <p class="text-gray-700">Export all your data into CSV</p>
        <div class="mt-4 flex space-x-4">
            <button id="downloadbutton" class="bg-green-500 text-white px-4 py-2 rounded-lg">Download</button>
            <button class="bg-gray-300 text-gray-700 px-4 py-2 rounded-lg" onclick="document.getElementById('exportOffcanvas').style.display = 'none';">Cancel</button>
        </div>
    </div>
</div>

<div id="overlay"></div>

</body>

</html>
