name: Build, Push, and Deploy to LeoCloud

on:
  push:
    branches:
      - main
      - 90-deployment
  pull_request:
    branches:
      - main
      - 90-deployment

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    strategy:
      matrix:
        service: [backend, frontend]

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Docker Buildx for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Enable BuildKit
      - name: Enable BuildKit
        run: |
          echo '{"experimental": true, "features": { "buildkit": true }}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      # Set up containerd image store
      - name: Set up containerd image store
        run: |
          sudo mkdir -p /etc/docker
          echo '{"storage-driver": "overlay2"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      # Cache Docker layers
      - name: Cache Docker layers
        uses: actions/cache@v3
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ github.sha }}
          restore-keys: |
            docker-

      # Install Java for Backend
      - name: Install Java
        if: matrix.service == 'backend'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'
          cache-dependency-path: |
            ./app/backend/*.gradle*
            ./app/backend/**/gradle-wrapper.properties

      # Cache Gradle for Backend
      - name: Cache Gradle
        if: matrix.service == 'backend'
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle

      # Build and Push Quarkus Backend Docker image
      - name: Build and Push Quarkus Backend Docker image
        if: matrix.service == 'backend'
        working-directory: ./app/backend
        run: |
          ./gradlew clean build --no-daemon -x test
          docker build --cache-from=type=local,src=/tmp/.buildx-cache \
                       --cache-to=type=local,dest=/tmp/.buildx-cache \
                       --tag ghcr.io/htl-leo-itp-2325-4-5bhitm/leoball-quarkus-backend:latest .
          docker push ghcr.io/htl-leo-itp-2325-4-5bhitm/leoball-quarkus-backend:latest

      # Install Node for Frontend
      - name: Install Node
        if: matrix.service == 'frontend'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: ./app/frontend/web/package.json

      # Cache NPM for Frontend
      - name: Cache NPM
        if: matrix.service == 'frontend'
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('app/frontend/web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      # Build and Push Angular Frontend Docker image
      - name: Build and Push Angular Frontend Docker image
        if: matrix.service == 'frontend'
        working-directory: ./app/frontend/web
        run: |
          npm i --legacy-peer-deps
          npx ng build
          docker build --cache-from=type=local,src=/tmp/.buildx-cache \
                       --cache-to=type=local,dest=/tmp/.buildx-cache \
                       --tag ghcr.io/htl-leo-itp-2325-4-5bhitm/leoball-angular-frontend:latest .
          docker push ghcr.io/htl-leo-itp-2325-4-5bhitm/leoball-angular-frontend:latest

      # Install kubectl
      - name: Install kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_BASE64 }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      # Apply Kubernetes Resources
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f .github/k8s/postgres.yaml
          kubectl apply -f .github/k8s/quarkus-backend.yaml
          kubectl apply -f .github/k8s/angular-frontend.yaml
          kubectl apply -f .github/k8s/ingress.yaml

      # Verify Deployments
      - name: Verify Quarkus Backend Deployment
        run: kubectl get pods -l app=quarkus-backend

      - name: Verify Angular Frontend Deployment
        run: kubectl get pods -l app=angular-frontend