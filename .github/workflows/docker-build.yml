name: Build and Push Quarkus and Angular Docker Images

on:
  push:
    branches:
      - 90-deployment
      - main
  pull_request:
    branches:
      - main
      - 90-deployment

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      # Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Set up Docker Buildx for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # Log in to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and Push Quarkus Backend Docker Image
      - name: Build and Push Quarkus Backend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./app/backend           # Path to your Quarkus backend folder
          file: ./app/backend/Dockerfile    # Path to the Dockerfile for Quarkus backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/htl-leo-itp-2325-4-5bhitm/leomail-quarkus-backend:latest

      # Build and Push Angular Frontend Docker Image
      - name: Build and Push Angular Frontend Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./app/frontend/web       # Path to your Angular frontend folder
          file: ./app/frontend/web/Dockerfile # Path to the Dockerfile for Angular frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/htl-leo-itp-2325-4-5bhitm/leoball-angular-frontend:latest

      # Verify that the Quarkus backend image has been pushed
      - name: Verify Quarkus Backend image is pushed
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/leomail-quarkus-backend:latest

      # Verify that the Angular frontend image has been pushed
      - name: Verify Angular Frontend image is pushed
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/leoball-angular-frontend:latest