name: Build and Push Quarkus Docker Image

on:
  push:
    branches:
      - 90-deployment
      - main
  pull_request:
    branches:
      - main
      - 90-deployment

jobs:
  build:
    runs-on: ubuntu-latest
    permissions: write-all

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/leomail-quarkus-backend:latest

      - name: Verify image is pushed
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/leomail-quarkus-backend:latest
