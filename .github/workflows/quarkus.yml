# File: .github/workflows/quarkus.yml
name: Build and Test Quarkus

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/backend

    steps:
      # Git Checkout (ohne actions/checkout)
      - name: Checkout code
        run: git clone ${{ github.repository_url }} .

      # Manuelle Installation von JDK 11
      - name: Install JDK 11
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-11-jdk
          java -version

      # Build und Test Quarkus Projekt
      - name: Build with Maven
        run: mvn clean package

      - name: Run tests
        run: mvn test
