# File: .github/workflows/angular.yml
name: Build and Test Angular

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout das Repository ins richtige Verzeichnis
      - name: Checkout code
        run: git clone https://github.com/htl-leo-itp-2325-4-5BHITM/Maturaballmanager.git

      # Prüfen, ob das Verzeichnis existiert
      - name: Verify frontend directory
        run: ls -la app/frontend/web

      # Manuelle Installation von Node.js
      - name: Install Node.js
        run: |
          curl -sL https://deb.nodesource.com/setup_16.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node -v
          npm -v

      # Installiere Abhängigkeiten im Web-Ordner
      - name: Install dependencies
        working-directory: app/frontend/web
        run: npm ci

      # Unit-Tests ausführen
      - name: Run tests
        working-directory: app/frontend/web
        run: npm test -- --watch=false

      # Produktions-Build
      - name: Build Angular app
        working-directory: app/frontend/web
        run: npm run build -- --prod

