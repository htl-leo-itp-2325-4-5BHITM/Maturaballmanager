# File: .github/workflows/angular.yml
name: Build and Test Angular

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app/frontend/web

    steps:
      # Git Checkout (ohne actions/checkout)
      - name: Checkout code
        run: git clone ${{ github.repository_url }} .

      # Manuelle Installation von Node.js
      - name: Install Node.js
        run: |
          curl -sL https://deb.nodesource.com/setup_16.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node -v
          npm -v

      # Abhängigkeiten installieren
      - name: Install dependencies
        run: npm ci

      # Unit-Tests ausführen
      - name: Run tests
        run: npm test -- --watch=false

      # Produktions-Build
      - name: Build Angular app
        run: npm run build -- --prod

